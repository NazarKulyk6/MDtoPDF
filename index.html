<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Markdown → PDF Converter</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <div class="dot"></div>
        <div class="title">Markdown → PDF Converter</div>
        <div class="subtitle">convert markdown to PDF instantly</div>
      </div>

      <div class="actions">
        <input id="fileNameInput" type="text" placeholder="File name" class="fileNameInput" />
        <button id="btnLoadMd" class="btn btn-secondary" type="button">Open .md</button>
        <button id="btnSaveMd" class="btn btn-secondary" type="button">Save .md</button>
        <button id="btnDownloadPdf" class="btn btn-primary" type="button">Save as PDF</button>
      </div>
    </header>

    <main class="grid">
      <section class="pane" id="editorPane">
        <div class="paneHeader">
          <div class="paneTitle">Markdown</div>
          <div class="paneHint">Ctrl+S: save • Ctrl+P: PDF • Drag & drop .md file</div>
        </div>
        <textarea id="editor" spellcheck="false"></textarea>
      </section>

      <section class="pane">
        <div class="paneHeader">
          <div class="paneTitle">Preview</div>
          <div class="paneHint">GitHub-style</div>
        </div>
        <article id="preview" class="preview markdown-body"></article>
      </section>
    </main>

    <input id="fileInput" type="file" accept=".md,text/markdown,text/plain" hidden />
    
    <div id="dropOverlay" class="dropOverlay">
      <div class="dropContent">
            <div class="dropPlus"></div>
        <div class="dropMessage">DROP</div>
        <div class="dropHint">Release to load .md file</div>
      </div>
    </div>

    <!-- Markdown rendering (stable) -->
    <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
    <!-- PDF download without print dialog -->
    <script src="https://cdn.jsdelivr.net/npm/html2pdf.js@0.10.1/dist/html2pdf.bundle.min.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
